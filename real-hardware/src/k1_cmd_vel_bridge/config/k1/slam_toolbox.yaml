slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    base_frame: trunk_link
    odom_frame: odom
    map_frame: map
    scan_topic: /k1/scan
    resolution: 0.05
    map_update_interval: 1.0
    transform_publish_period: 0.05
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
    max_laser_range: 6.0
    throttle_scans: 1
    enable_interactive_mode: false
