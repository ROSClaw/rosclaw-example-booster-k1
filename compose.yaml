services:
  k1-sim:
    image: ${IMAGE_NAME:-rosclaw-example-booster-k1:0.1.0}
    container_name: ${CONTAINER_NAME:-rosclaw-example-booster-k1}
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        rosclaw_ros2: ${ROSCLAW_ROS2_DIR:-../rosclaw-ros2}
        booster_train: ${BOOSTER_TRAIN_DIR:-../../Isaac-Sim-Go2/Booster-K1/booster_train}
        booster_assets: ${BOOSTER_ASSETS_DIR:-../../Isaac-Sim-Go2/Booster-K1/booster_assets}
      args:
        ISAAC_SIM_BASE_IMAGE: ${ISAAC_SIM_BASE_IMAGE:-nvcr.io/nvidia/isaac-sim:5.0.0}
        ROS_DISTRO: ${K1_ROS_DISTRO:-humble}
        ISAACLAB_REF: ${ISAACLAB_REF:-v2.2.0}
    network_mode: host
    ipc: host
    gpus: all
    tty: true
    stdin_open: true
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      PRIVACY_CONSENT: ${PRIVACY_CONSENT:-Y}
      LIVESTREAM: ${LIVESTREAM:-2}
      PUBLIC_IP: ${PUBLIC_IP:-}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      FASTDDS_BUILTIN_TRANSPORTS: ${FASTDDS_BUILTIN_TRANSPORTS:-UDPv4}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
      ROS_DISTRO: ${K1_ROS_DISTRO:-humble}
      SYSTEM_ROS_DISTRO: ${K1_ROS_DISTRO:-humble}
      ISAACSIM_INTERNAL_ROS_DISTRO: ${ISAACSIM_INTERNAL_ROS_DISTRO:-jazzy}
      ISAAC_LIVESTREAM_PORT: ${ISAAC_LIVESTREAM_PORT:-49100}
      K1_NAMESPACE: ${K1_NAMESPACE:-k1}
      K1_ENV_COUNT: ${K1_ENV_COUNT:-1}
      K1_TERRAIN: ${K1_TERRAIN:-flat}
      K1_CONTROL_MODE: ${K1_CONTROL_MODE:-motion_replay}
      K1_FREEZE_MOTION: ${K1_FREEZE_MOTION:-1}
      K1_MOTION_NAME: ${K1_MOTION_NAME:-k1_mj2_seg1}
      K1_MOTION_START_FRAME: ${K1_MOTION_START_FRAME:-53}
      K1_POLICY_CHECKPOINT: ${K1_POLICY_CHECKPOINT:-/workspace/checkpoints/walking_policy_latest.pt}
      K1_COMPAT_POLICY_CHECKPOINT: ${K1_COMPAT_POLICY_CHECKPOINT:-/workspace/checkpoints/k1_cmd_vel.pt}
      K1_TELEOP_DEVICE: ${K1_TELEOP_DEVICE:-cmd_vel}
      K1_SLIDE_DISABLE_GRAVITY: ${K1_SLIDE_DISABLE_GRAVITY:-1}
      K1_DISABLE_KEYBOARD_TELEOP: ${K1_DISABLE_KEYBOARD_TELEOP:-0}
      K1_SDK_COMPAT: ${K1_SDK_COMPAT:-0}
      K1_USE_PLAIN_HEAD: ${K1_USE_PLAIN_HEAD:-0}
      K1_SCENE_MODELS_DIR: ${K1_SCENE_MODELS_DIR:-/workspace/scene_models}
      K1_SCENE_MODELS_DISTANCE: ${K1_SCENE_MODELS_DISTANCE:-2.5}
      K1_SCENE_MODELS_SPACING: ${K1_SCENE_MODELS_SPACING:-1.25}
      K1_SCENE_MODELS_HEIGHT: ${K1_SCENE_MODELS_HEIGHT:-0.0}
      K1_SCENE_MODELS_SCALE: ${K1_SCENE_MODELS_SCALE:-0.01}
      K1_CMD_GOVERNOR_ENABLED: ${K1_CMD_GOVERNOR_ENABLED:-1}
      K1_CMD_GOV_MAX_LINEAR_X: ${K1_CMD_GOV_MAX_LINEAR_X:-0.06}
      K1_CMD_GOV_MAX_LINEAR_Y: ${K1_CMD_GOV_MAX_LINEAR_Y:-0.0}
      K1_CMD_GOV_MAX_ANGULAR_Z: ${K1_CMD_GOV_MAX_ANGULAR_Z:-0.08}
      K1_CMD_GOV_LINEAR_ACCEL: ${K1_CMD_GOV_LINEAR_ACCEL:-0.08}
      K1_CMD_GOV_ANGULAR_ACCEL: ${K1_CMD_GOV_ANGULAR_ACCEL:-0.12}
      K1_CMD_GOV_TILT_WARN: ${K1_CMD_GOV_TILT_WARN:-0.18}
      K1_CMD_GOV_TILT_STOP: ${K1_CMD_GOV_TILT_STOP:-0.24}
      K1_CMD_GOV_BASE_ANG_VEL_STOP: ${K1_CMD_GOV_BASE_ANG_VEL_STOP:-1.6}
      K1_CMD_GOV_RECOVERY_SEC: ${K1_CMD_GOV_RECOVERY_SEC:-1.0}
      K1_STAND_POSE_ENABLED: ${K1_STAND_POSE_ENABLED:-1}
      K1_STAND_POSE_FRAME: ${K1_STAND_POSE_FRAME:-17}
      K1_STAND_POSE_USE_DEFAULT: ${K1_STAND_POSE_USE_DEFAULT:-0}
      K1_STAND_POSE_LINEAR_DEADBAND: ${K1_STAND_POSE_LINEAR_DEADBAND:-0.02}
      K1_STAND_POSE_ANGULAR_DEADBAND: ${K1_STAND_POSE_ANGULAR_DEADBAND:-0.03}
      K1_STAND_POSE_ENGAGE_SEC: ${K1_STAND_POSE_ENGAGE_SEC:-0.25}
      K1_STAND_POSE_RELEASE_SEC: ${K1_STAND_POSE_RELEASE_SEC:-0.60}
      K1_STAND_BALANCE_ENABLED: ${K1_STAND_BALANCE_ENABLED:-0}
      K1_STAND_BALANCE_GRAVITY_DEADBAND: ${K1_STAND_BALANCE_GRAVITY_DEADBAND:-0.02}
      K1_STAND_BALANCE_LINEAR_VEL_DEADBAND: ${K1_STAND_BALANCE_LINEAR_VEL_DEADBAND:-0.01}
      K1_STAND_BALANCE_ANG_VEL_DEADBAND: ${K1_STAND_BALANCE_ANG_VEL_DEADBAND:-0.12}
      K1_STAND_BALANCE_PITCH_GRAVITY_GAIN: ${K1_STAND_BALANCE_PITCH_GRAVITY_GAIN:--0.10}
      K1_STAND_BALANCE_PITCH_RATE_GAIN: ${K1_STAND_BALANCE_PITCH_RATE_GAIN:--0.025}
      K1_STAND_BALANCE_PITCH_VELOCITY_GAIN: ${K1_STAND_BALANCE_PITCH_VELOCITY_GAIN:--0.04}
      K1_STAND_BALANCE_ROLL_GRAVITY_GAIN: ${K1_STAND_BALANCE_ROLL_GRAVITY_GAIN:-0.08}
      K1_STAND_BALANCE_ROLL_RATE_GAIN: ${K1_STAND_BALANCE_ROLL_RATE_GAIN:-0.020}
      K1_STAND_BALANCE_ROLL_VELOCITY_GAIN: ${K1_STAND_BALANCE_ROLL_VELOCITY_GAIN:-0.030}
      K1_STAND_BALANCE_HIP_PITCH_WEIGHT: ${K1_STAND_BALANCE_HIP_PITCH_WEIGHT:-0.75}
      K1_STAND_BALANCE_KNEE_PITCH_WEIGHT: ${K1_STAND_BALANCE_KNEE_PITCH_WEIGHT:-0.10}
      K1_STAND_BALANCE_ANKLE_PITCH_WEIGHT: ${K1_STAND_BALANCE_ANKLE_PITCH_WEIGHT:-1.0}
      K1_STAND_BALANCE_HIP_ROLL_WEIGHT: ${K1_STAND_BALANCE_HIP_ROLL_WEIGHT:-0.55}
      K1_STAND_BALANCE_ANKLE_ROLL_WEIGHT: ${K1_STAND_BALANCE_ANKLE_ROLL_WEIGHT:-0.85}
      K1_STAND_BALANCE_MAX_PITCH_DELTA: ${K1_STAND_BALANCE_MAX_PITCH_DELTA:-0.08}
      K1_STAND_BALANCE_MAX_ROLL_DELTA: ${K1_STAND_BALANCE_MAX_ROLL_DELTA:-0.06}
      K1_LOCO_GAIN_OVERRIDE_ENABLED: ${K1_LOCO_GAIN_OVERRIDE_ENABLED:-1}
      K1_LOCO_LEG_STIFFNESS: ${K1_LOCO_LEG_STIFFNESS:-120.0}
      K1_LOCO_LEG_DAMPING: ${K1_LOCO_LEG_DAMPING:-4.0}
      K1_LOCO_FOOT_STIFFNESS: ${K1_LOCO_FOOT_STIFFNESS:-50.0}
      K1_LOCO_FOOT_DAMPING: ${K1_LOCO_FOOT_DAMPING:-2.5}
      K1_FALL_RESET_ENABLED: ${K1_FALL_RESET_ENABLED:-1}
      K1_FALL_RESET_MIN_HEIGHT: ${K1_FALL_RESET_MIN_HEIGHT:-0.38}
      ROSCLAW_K1_SDK_ENABLED: ${ROSCLAW_K1_SDK_ENABLED:-0}
      ROSCLAW_READY_FILE: ${ROSCLAW_READY_FILE:-/tmp/rosclaw-k1-ready.json}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ./docker/entrypoint-k1.sh:/entrypoint-k1.sh:ro
      - ./overrides/control.py:/workspace/booster_train/source/booster_train/booster_train/demo/control.py:ro
      - ./overrides/motion_replay.py:/workspace/booster_train/source/booster_train/booster_train/demo/motion_replay.py:ro
      - ./overrides/velocity_env.py:/workspace/booster_train/source/booster_train/booster_train/demo/velocity_env.py:ro
      - ${POLICY_HOST_PATH:-./walking_policy_latest.pt}:/workspace/checkpoints/walking_policy_latest.pt:ro
      - ${POLICY_FALLBACK_HOST_PATH:-../../Isaac-Sim-Go2/ROSClaw-Vision/checkpoints/k1_cmd_vel.pt}:/workspace/checkpoints/k1_cmd_vel.pt:ro
      - ${VISION_MODELS_DIR:-../../Isaac-Sim-Go2/ROSClaw-Vision/models}:/workspace/scene_models:ro
      - ${ISAAC_CACHE_KIT_DIR:-./.docker/isaac-sim/cache/kit}:/isaac-sim/kit/cache:rw
      - ${ISAAC_CACHE_OV_DIR:-./.docker/isaac-sim/cache/ov}:/root/.cache/ov:rw
      - ${ISAAC_CACHE_PIP_DIR:-./.docker/isaac-sim/cache/pip}:/root/.cache/pip:rw
      - ${ISAAC_CACHE_GLCACHE_DIR:-./.docker/isaac-sim/cache/glcache}:/root/.cache/nvidia/GLCache:rw
      - ${ISAAC_CACHE_COMPUTE_DIR:-./.docker/isaac-sim/cache/computecache}:/root/.nv/ComputeCache:rw
      - ${ISAAC_LOGS_DIR:-./.docker/isaac-sim/logs}:/root/.nvidia-omniverse/logs:rw
      - ${ISAAC_DATA_DIR:-./.docker/isaac-sim/data}:/root/.local/share/ov/data:rw
      - ${ISAAC_DOCS_DIR:-./.docker/isaac-sim/documents}:/root/Documents:rw
    restart: unless-stopped
